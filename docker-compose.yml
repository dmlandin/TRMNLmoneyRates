services:
  trmnl-rates:
    build: .
    image: trmnl-money-rates:latest
    container_name: trmnl-money-rates
    restart: unless-stopped
    environment:
      # Required
      FRED_API_KEY: "${FRED_API_KEY:?set FRED_API_KEY in .env}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:?set GITHUB_TOKEN in .env}"
      # Optional (defaults shown)
      REPO_URL: "https://github.com/dmlandin/TRMNLmoneyRates.git"
      BRANCH: "main"
      RUN_ON_START: "true"
      # Persist logs to the mounted /logs dir below. Unset to log to console only.
      LOG_DIR: "/logs"
      # Keep this many days of per-day logfiles; older ones are pruned each run.
      LOG_RETENTION_DAYS: "2"
    volumes:
      - trmnl-data:/data
      # Host dir of your choosing -> /logs. Daily updater-<date>.log files land here.
      - ./logs:/logs

volumes:
  trmnl-data:

name: Update Money Rates Page

# ---------------------------------------------------------------------------
# MIGRATED: the hourly schedule now runs on a local Unraid Docker container
# (see DEPLOY-UNRAID.md). The cron trigger is disabled so the local server and
# GitHub Actions don't both push rate updates. This workflow is kept only as a
# manual fallback -- trigger it from the Actions tab ("Run workflow") if the
# local server is offline. Re-enable by uncommenting the `schedule:` block.
# ---------------------------------------------------------------------------
on:
  # schedule:
  #   - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate updated rates.html
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python generate_html.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add rates.html rates.json trmnl_layout.json medical_spreads.json
          git commit -m "Update rates.html [ci skip]" || echo "No changes to commit"
          git push

